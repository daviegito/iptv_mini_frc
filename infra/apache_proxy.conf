<VirtualHost *:80>
    # Este arquivo deverá ser colocado no R1 em: /etc/apache2/sites-available/iptv.conf
    ServerName iptv-mini.local
    ServerAdmin admin@iptv.local

    # 1. Hospedagem do Frontend
    # É aqui que a equipe copiará os arquivos da nossa pasta /frontend (index.html, style.css, app.js)
    DocumentRoot /var/www/html/iptv

    <Directory /var/www/html/iptv>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # 2. O Proxy Reverso (A Exigência do Professor)
    # Habilitando segurança para não atuar como proxy aberto
    ProxyRequests Off
    ProxyPreserveHost On

    # Intercepta rotas da API e redireciona para a máquina Servidora (S) no IP 172.16.0.2 (Porta 8000)
    
    ProxyPass /login http://172.16.0.2:8000/login
    ProxyPassReverse /login http://172.16.0.2:8000/login

    ProxyPass /me http://172.16.0.2:8000/me
    ProxyPassReverse /me http://172.16.0.2:8000/me

    ProxyPass /channels http://172.16.0.2:8000/channels
    ProxyPassReverse /channels http://172.16.0.2:8000/channels

    ProxyPass /play http://172.16.0.2:8000/play
    ProxyPassReverse /play http://172.16.0.2:8000/play

    # Logs separados para facilitar o debug da equipe
    ErrorLog ${APACHE_LOG_DIR}/iptv_error.log
    CustomLog ${APACHE_LOG_DIR}/iptv_access.log combined
</VirtualHost>
